# RoleTalk API Configuration
# This file contains default settings for the development environment.
# Secrets and environment-specific overrides must be provided via the .env file.

env: "development"

app:
  name: "RoleTalk-API"
  version: "1.0.0"

# HTTP Server Settings
# Using longer timeouts to accommodate heavy AI processing (STT/LLM/TTS).
http:
  port: ":8080"
  read_timeout: "120s"
  write_timeout: "120s"
  idle_timeout: "60s"
  shutdown_timeout: "10s"

# AI gRPC Microservice (Python Assistant)
# Address must match the service name in docker-compose.yml.
ai:
  addr: "assistant-api:50051"

# LLM Provider (Ollama)
# host.docker.internal allows the container to reach Ollama running on your macOS.
ollama:
  url: "http://host.docker.internal:11434"
  model: "qwen2.5:latest"

# Telemetry and Monitoring (OpenTelemetry + Grafana Stack)
observability:
  enabled: true
  # FIX: Routes data through otel-collector instead of sending logs to Tempo.
  # This resolves the "unknown service opentelemetry.proto.collector.logs.v1.LogsService" error.
  otlp_endpoint: "otel-collector:4317"
  loki_url: "http://loki:3100/loki/api/v1/push"
  sample_rate: 1.0

# Rate Limiting Settings (Requests per second)
rate_limit:
  enabled: true
  cleanup_interval: "3m"
  global:
    limit: 20.0
    burst: 40
  auth:
    limit: 2.0
    burst: 5

# JWT and Token Lifecycle
auth:
  access_token_ttl: "30m"
  refresh_token_ttl: "168h"
  email_verification_ttl: "24h"
  password_reset_ttl: "1h"

# Database Settings (PostgreSQL)
postgres:
  host: "db"
  port: 5432
  ssl_mode: "disable"
  pool:
    max_conns: 20
    min_conns: 5
    max_conn_lifetime: "30m"

# Cache Layer (Redis)
redis:
  addr: "redis:6379"
  db: 0
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  pool:
    pool_size: 10
    min_idle_conns: 5
    max_retries: 3

# Message Broker (RabbitMQ)
rabbitmq:
  host: "rabbitmq"
  port: 5672
  queue_name: "roletalk_tasks"
  exchange_name: "roletalk_exchange"
  dlx_name: "roletalk_dlx"
  dlq_name: "roletalk_dlq"

# S3 Compatible Storage (MinIO)
# Note: internalAddr (s3) is used by Go, while externalAddr (localhost) is used by Flutter.
minio:
  endpoint: "s3:9000"
  # Host:port reachable from Flutter/simulator (not the Docker service name).
  public_endpoint: "localhost:9000"
  bucket: "roletalk-storage"
  use_ssl: false
  # Avoids SigV4 region discovery HTTP calls against public_endpoint (broken when API runs in Docker and host is localhost).
  region: "us-east-1"

# Transactional Email (SMTP)
smtp:
  host: "smtp.gmail.com"
  port: 587
  from_address: "retimixa@gmail.com"

# Application URLs
client:
  url: "http://localhost:5173"
api:
  url: "http://localhost:8080"

# Logging Settings (debug, info, warn, error)
logging:
  level: "debug"