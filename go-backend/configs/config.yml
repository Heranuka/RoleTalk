# RoleTalk API Configuration
# This file contains default settings. Sensitive secrets (Passwords, Keys)
# must be provided via the .env file or environment variables.

env: "development"

app:
  name: "RoleTalk-API"
  version: "1.0.0"

# HTTP Server Settings
http:
  port: ":8080"
  read_timeout: "15s"
  write_timeout: "15s"
  idle_timeout: "60s"
  shutdown_timeout: "10s"

# AI gRPC Microservice (Python)
ai:
  addr: "voice-assistant:50051"

# LLM Provider (Ollama)
ollama:
  url: "http://host.docker.internal:11434"
  model: "qwen2.5:latest"

# Telemetry and Monitoring (OpenTelemetry + Grafana Stack)
observability:
  enabled: true
  otlp_endpoint: "tempo:4317" # OTLP gRPC endpoint
  loki_url: "http://loki:3100/loki/api/v1/push"
  sample_rate: 1.0

# Rate Limiting Settings (Requests per second)
rate_limit:
  enabled: true
  cleanup_interval: "3m"
  global:
    limit: 20.0
    burst: 40
  auth:
    limit: 2.0
    burst: 5

# JWT and Token Lifecycle
auth:
  access_token_ttl: "30m"
  refresh_token_ttl: "168h"
  email_verification_ttl: "24h"
  password_reset_ttl: "1h"

# Database Settings (PostgreSQL)
postgres:
  host: "db"
  port: 5432
  ssl_mode: "disable"
  pool:
    max_conns: 20
    min_conns: 5
    max_conn_lifetime: "30m"

# Cache Layer (Redis)
redis:
  addr: "redis:6379"
  db: 0
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"
  pool:
    pool_size: 10
    min_idle_conns: 5
    max_retries: 3

# Message Broker (RabbitMQ)
rabbitmq:
  host: "rabbitmq"
  port: 5672
  queue_name: "roletalk_tasks"
  exchange_name: "roletalk_exchange"
  dlx_name: "roletalk_dlx"
  dlq_name: "roletalk_dlq"

# S3 Compatible Storage (MinIO)
minio:
  endpoint: "s3:9000"
  bucket: "roletalk-storage"
  use_ssl: false

# Transactional Email (SMTP)
smtp:
  host: "smtp.gmail.com"
  port: 587
  from_address: "retimixa@gmail.com"

# Application URLs
client:
  url: "http://localhost:5173"
api:
  url: "http://localhost:8080"

# Logging Level (debug, info, warn, error)
logging:
  level: "debug"