receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s

exporters:
  # Настройка для Tempo
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true

  # Настройка для Loki (OTLP протокол)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # КРИТИЧНО ДЛЯ ПРОВЕРКИ: выводит всё в консоль контейнера
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: "info"
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]